media:
  input: src/assets
  output: /assets

content:
  - name: pages
    label: Pages
    type: files
    files:
      - name: Publications
        path: src/content/pages/publications.md
        fields:
          - { name: title, label: Title, type: string }
          - { name: slug, label: Slug, type: string }
          - { name: source, label: Source, type: select, options: [cms, google-doc-embed, google-doc-fetch] }
          - { name: googleDocId, label: Google Doc ID, type: string }
          - { name: heroImage, label: Hero Image, type: image }
          - { name: body, label: Body, type: rich-text }

  - name: publications
    label: Publications
    type: collection
    path: src/content/publications
    view:
      fields: [title, year, authors]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - { name: authors, label: Authors, type: text }
      - { name: journal, label: Journal/Publisher, type: string }
      - { name: year, label: Year, type: string }
      - { name: abstract, label: Abstract, type: rich-text }
      - { name: pdfUrl, label: PDF URL, type: string }
      - { name: fullUrl, label: Full URL, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: cover, label: Cover Image, type: image }